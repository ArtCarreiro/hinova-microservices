spring.application.name=crm-service
server.port=8080

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hinovaUser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hinovaPassword}
logging.level.org.hibernate.orm.connections.pooling=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.hibernate=ERROR

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# Integration
sign.base-url=${SIGN_BASE_URL:http://localhost:8081}

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP:crm-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.crm_service.messaging.dto.ContractSignedEventDTO
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.crm_service.events
app.kafka.topics.contract-signed=${KAFKA_TOPIC_CONTRACT_SIGNED:contract-signed.v1}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
