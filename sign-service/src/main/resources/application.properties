spring.application.name=sign-service

server.port=8081

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hinovaUser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hinovaPassword}

spring.jpa.hibernate.ddl-auto=update

# Kafka configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Integration
crm.base-url=${CRM_BASE_URL:http://localhost:8080}
crm.callback-url=${CRM_CALLBACK_URL:http://localhost:8080/sign/callbacks/contract-signed}