version: '3.8'

services:

  mysql-crm:
    image: mysql:8
    container_name: mysql-crm
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crm
      MYSQL_USER: hinovaUser
      MYSQL_PASSWORD: hinovaPassword
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot" ]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "3306:3306"
    networks:
      - backend

  mysql-sign:
    image: mysql:8
    container_name: mysql-sign
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sign
      MYSQL_USER: hinovaUser
      MYSQL_PASSWORD: hinovaPassword
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot" ]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "3307:3306"
    networks:
      - backend

  crm-service:
    build: ./crm-service
    container_name: crm-service
    depends_on:
      mysql-crm:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-crm:3306/crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SIGN_BASE_URL: http://sign-service:8081
    ports:
      - "8080:8080"
    networks:
      - backend

  sign-service:
    build: ./sign-service
    container_name: sign-service
    depends_on:
      mysql-sign:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-sign:3306/sign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    networks:
      - backend

networks:
  backend:
    driver: bridge